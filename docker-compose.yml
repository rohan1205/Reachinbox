version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: reachinbox_pg_v2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: scheduler
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reachinbox_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  postgres_data_v2:
